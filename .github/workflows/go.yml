name: build-go-project

on: push

jobs:
  build-go-project:
    name: Build Go Project
    runs-on: ubuntu-latest
    steps:

      - name: Checkout Git Project
        uses: actions/checkout@v2

      - name: Setup Go Env
        uses: actions/setup-go@v2
        with:
          go-version: '1.14.1'

      - name: Run Go Tests
        run: go test ./...
